<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <base href="../">
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Projetos | Rafael Costa Varela</title>
  <meta name="description" content="Projetos de Rafael Costa Varela nas categorias Arduino/IoT e Websites, com filtros rápidos e layout em cards." />

  <link rel="canonical" href="https://rafacvarela.github.io/projects/projects.html" />
  <meta name="robots" content="index,follow" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="header-container"></div>

  <main class="container stack-lg">
    <section class="section">
      <header class="section-header">
        <h1>Projetos</h1>
        <p>Filtre por categoria e acesse os repositórios/demos.</p>
      </header>

      <div class="filters" role="toolbar" aria-label="Filtros de projetos">
        <button class="filter-btn" type="button" data-filter="all" aria-pressed="true">Todos</button>
        <button class="filter-btn" type="button" data-filter="arduino" aria-pressed="false">Arduino</button>
        <button class="filter-btn" type="button" data-filter="websites" aria-pressed="false">Websites</button>
      </div>
    </section>

    <section class="section">
      <div class="grid" data-projects aria-live="polite"></div>
    </section>
  </main>

  <div id="footer-container"></div>

  <script src="js/main.js"></script>
  <script src="js/data.js"></script>
  <script src="js/projects-filter.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const grid = document.querySelector("[data-projects]");
      const projects = (window.PORTFOLIO && window.PORTFOLIO.projects) ? window.PORTFOLIO.projects : [];

      grid.innerHTML = projects.map((p) => `
        <article class="card col-12 col-6" data-category="${p.category}">
          <img src="${p.thumb}" alt="${p.thumbAlt}" loading="lazy" decoding="async">
          <div class="card-body">
            <h2 class="card-title">${p.title}</h2>
            <p class="card-desc">${p.desc}</p>
            <div class="card-meta">
              <span class="chip">${p.category === "arduino" ? "Arduino/IoT" : "Websites"}</span>
              <a class="btn btn-primary" href="${p.link}" ${p.link.startsWith("http") ? 'target="_blank" rel="noopener noreferrer"' : ""}>
                Ver projeto
              </a>
            </div>
          </div>
        </article>
      `).join("");
    });
  </script>
</body>
</html>
